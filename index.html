<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubra seu Signo - Astrologia</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="content-card" id="form-container">
            <div class="page-header">
                <div class="zodiac-icon">✨</div>
                <h1>Descubra seu Signo</h1>
                <p>Informe sua data de nascimento e descubra qual é o seu signo</p>
            </div>

            <form id="signo-form">
                <div class="mb-4">
                    <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                    <input 
                        type="date" 
                        class="form-control" 
                        id="data_nascimento" 
                        name="data_nascimento" 
                        required
                        max=""
                    >
                    <div class="form-text">Selecione sua data de nascimento para descobrir seu signo</div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Descobrir meu Signo
                    </button>
                </div>
            </form>
        </div>

        <!-- Container para exibir o resultado -->
        <div class="content-card" id="result-container" style="display: none;">
            <div class="signo-result">
                <div class="zodiac-icon" id="signo-emoji"></div>
                <h2 id="signo-nome"></h2>
                <p class="signo-period" id="signo-periodo"></p>
                
                <div class="alert alert-info">
                    <strong>Sua data de nascimento:</strong> <span id="data-formatada"></span>
                </div>
                
                <div class="signo-description" id="signo-descricao"></div>
                
                <button onclick="voltarFormulario()" class="btn btn-secondary btn-lg mt-3">
                    ← Voltar
                </button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>
    
    <!-- Custom JS -->
    <script src="assets/js/signos.js"></script>
</body>
</html>
